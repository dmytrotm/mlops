name: Model CI (Train, Test, Report, Docker, Airflow)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Lint (flake8 — critical errors only)
        run: |
          flake8 src/ tests/ dags/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Format check (black)
        run: |
          black src/ tests/ dags/ --check --diff || true

  pre-train-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run pre-train tests (data validation)
        run: |
          pytest tests/test_data.py -v --tb=short

  airflow-dag-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Airflow dependencies
        # Для тестування DAG-ів локально (поза докером) потрібен apache-airflow
        run: |
          python -m pip install --upgrade pip
          pip install apache-airflow==2.9.2
          pip install pytest
          pip install mlflow==2.11.3 scikit-learn numpy pandas scipy optuna

      - name: Run DAG integrity tests
        run: |
          pytest tests/test_airflow_dags.py -v --tb=short
        env:
          AIRFLOW_HOME: "dags"

  docker-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Image
        run: |
          docker build -t mlops_lab_img:latest .
          echo "Docker image built successfully"

  train-and-test:
    runs-on: ubuntu-latest
    needs: [lint, pre-train-tests, airflow-dag-tests, docker-build-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Train model
        run: |
          python src/train.py --data_dir data/prepared --model_dir data/models --smote --max_depth 20 --n_estimators 200

      - name: Run post-train tests (Quality Gate)
        env:
          F1_THRESHOLD: "0.50"
          ACC_THRESHOLD: "0.75"
          AUC_THRESHOLD: "0.70"
        run: |
          pytest tests/test_model.py -v --tb=short

      - name: Create CML report (PR only)
        if: github.event_name == 'pull_request'
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install cml
          echo "## 📊 Model Metrics" > report.md
          echo '```json' >> report.md
          cat artifacts/metrics.json >> report.md
          echo '' >> report.md
          echo '```' >> report.md
          echo "" >> report.md

          echo "## 📈 Confusion Matrix" >> report.md
          cml publish artifacts/confusion_matrix.png --md >> report.md
          echo "" >> report.md

          echo "## 📊 Feature Importance" >> report.md
          cml publish artifacts/feature_importance.png --md >> report.md
          echo "" >> report.md

          echo "### ✅ Quality Gate" >> report.md
          echo "- F1 threshold: ${F1_THRESHOLD}" >> report.md
          echo "- Accuracy threshold: ${ACC_THRESHOLD}" >> report.md
          echo "- ROC-AUC threshold: ${AUC_THRESHOLD}" >> report.md

          # Baseline comparison (if baseline exists)
          if [ -f baseline/metrics.json ]; then
            echo "" >> report.md
            echo "## 🔄 Baseline Comparison" >> report.md
            python -c "
          import json
          with open('baseline/metrics.json') as f: bl = json.load(f)
          with open('artifacts/metrics.json') as f: cur = json.load(f)
          print('| Metric | Baseline | Current | Δ |')
          print('|---|---|---|---|')
          for k in sorted(bl.keys()):
              if k in cur:
                  d = cur[k] - bl[k]
                  arrow = '⬆️' if d > 0 else ('⬇️' if d < 0 else '➡️')
                  print(f'| {k} | {bl[k]:.4f} | {cur[k]:.4f} | {arrow} {d:+.4f} |')
          " >> report.md
          fi

          cml comment create report.md

      - name: Upload model artifact (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: |
            data/models/model.joblib
            artifacts/metrics.json
            artifacts/confusion_matrix.png
